name: 🔐 Secret & Policy Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write   # needed for SARIF upload (optional, safe to keep)

jobs:
  # ────────────────────────────────────────────────────────────────
  # JOB 1 — Gitleaks: deep secret scan over the entire commit range
  # ────────────────────────────────────────────────────────────────
  gitleaks:
    name: 🔎 Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # scan every commit, not just HEAD

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # only needed for Gitleaks Enterprise

  # ────────────────────────────────────────────────────────────────
  # JOB 2 — Custom policy checks (env files + non-README .md files)
  # ────────────────────────────────────────────────────────────────
  policy-check:
    name: 📋 Policy Compliance Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2a. Detect any committed .env / secret files ────────────
      - name: Check for committed env / secret files
        run: |
          echo "🔍 Scanning tracked files for env / secret patterns..."
          FORBIDDEN_FILES=$(git ls-files | grep -E \
            '(^|/)\.env($|\.[^e])|\.env\.local$|\.env\.(development|production|staging|test)$|\.pem$|\.key$|\.p12$|\.jks$|\.pfx$|\.keystore$|\.secret$' \
            || true)

          if [ -n "$FORBIDDEN_FILES" ]; then
            echo "❌ FAIL: The following secret / env files are tracked in git:"
            echo "$FORBIDDEN_FILES"
            echo ""
            echo "👉 Remove them with:  git rm --cached <file>"
            echo "   Then add the pattern to .gitignore and commit again."
            exit 1
          else
            echo "✅ No committed env / secret files found."
          fi

      # ── 2b. Scan entire git history for env leaks ───────────────
      - name: Scan git history for ever-committed env files
        run: |
          echo "🔍 Scanning ALL commits for historically committed env files..."
          LEAKED=$(git log --all --name-only --diff-filter=A --pretty=format: | grep -E \
            '(^|/)\.env($|\.[^e])|\.env\.local$|\.env\.(development|production|staging|test)$' \
            | sort -u || true)

          if [ -n "$LEAKED" ]; then
            echo "⚠️  WARNING: The following env files appear in the commit history:"
            echo "$LEAKED"
            echo ""
            echo "👉 These were once committed. Rotate any secrets they contained!"
            echo "   Use 'git filter-repo' or BFG Repo Cleaner to purge them from history."
            # Warn-only — set to 'exit 1' to make this a hard failure
          else
            echo "✅ No env files found in commit history."
          fi

      # ── 2c. Detect committed non-README .md files ───────────────
      - name: Check for non-README markdown files
        run: |
          echo "🔍 Checking tracked files for non-README .md files..."
          # Allow README.md at any depth; block everything else
          MD_FILES=$(git ls-files | grep -E '\.md$' | grep -viE '(^|/)README\.md$' || true)

          if [ -n "$MD_FILES" ]; then
            echo "❌ FAIL: The following non-README markdown files are tracked:"
            echo "$MD_FILES"
            echo ""
            echo "👉 Remove them with:  git rm --cached <file>"
            echo "   Then ensure '*.md' (except !README.md) is in .gitignore."
            exit 1
          else
            echo "✅ No non-README .md files found in the index."
          fi

      # ── 2d. Inline secret pattern grep on staged content ────────
      - name: Grep tracked content for hardcoded secrets
        run: |
          echo "🔍 Scanning file content for hardcoded secret patterns..."
          # Patterns: API keys, tokens, passwords, connection strings
          PATTERN='(DIDIT_API_KEY|DIDIT_WEBHOOK_SECRET|NGROK_AUTHTOKEN|ngrok_authtoken|password\s*=\s*["\x27][^"\x27]{4,}|api[_-]?key\s*=\s*["\x27][^"\x27]{8,}|secret\s*=\s*["\x27][^"\x27]{8,}|token\s*=\s*["\x27][^"\x27]{8,}|-----BEGIN (RSA|EC|OPENSSH|PGP) PRIVATE KEY)'

          HITS=$(git grep -nEi "$PATTERN" -- \
            ':!*.example' \
            ':!**/.env.example' \
            ':!*.md' \
            ':!.gitignore' \
            ':!.github/workflows/' \
            || true)

          if [ -n "$HITS" ]; then
            echo "❌ FAIL: Potential hardcoded secrets detected in tracked files:"
            echo "$HITS"
            echo ""
            echo "👉 Move these values to environment variables / GitHub Secrets."
            exit 1
          else
            echo "✅ No hardcoded secret patterns found in tracked content."
          fi
