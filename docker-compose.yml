services:
  keycloak-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=keycloak
      - POSTGRES_PASSWORD=keycloak
    volumes:
      - floucna-keycloak-db:/var/lib/postgresql/data
    networks:
      - floucna-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    restart: unless-stopped
    command: start-dev --import-realm
    ports:
      - "8081:8080"
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=keycloak
      - KC_HOSTNAME=http://localhost:8081
      - KC_HOSTNAME_STRICT=false
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin123
      - KC_HEALTH_ENABLED=true
    volumes:
      - ./keycloak/realm-floucna.json:/opt/keycloak/data/import/realm-floucna.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - floucna-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: floucna-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - floucna-db:/app/data
      - floucna-storage:/app/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - FLOUCNA_DB_PATH=/app/data/floucna.db
      - FLOUCNA_ALLOWED_ORIGINS=http://localhost:3000

      # Auth mode: KEYCLOAK or LOCAL
      - FLOUCNA_AUTH_MODE=KEYCLOAK

      # Keycloak (required only when FLOUCNA_AUTH_MODE=KEYCLOAK)
      - FLOUCNA_KEYCLOAK_INTROSPECTION_URL=http://keycloak:8080/realms/floucna/protocol/openid-connect/token/introspect
      - FLOUCNA_KEYCLOAK_CLIENT_ID=floucna-backend
      - FLOUCNA_KEYCLOAK_CLIENT_SECRET=1HJXGipQYftfaqiVd4J5IzzRxel6HfKq

      # KYC mode: DIDIT or LOCAL
      - FLOUCNA_KYC_MODE=DIDIT
      - FLOUCNA_KYC_ALLOW_FALLBACK=false
      - FLOUCNA_DIDIT_API_BASE_URL=${FLOUCNA_DIDIT_API_BASE_URL:-https://verification.didit.me}
      - FLOUCNA_DIDIT_WORKFLOW_ID=${FLOUCNA_DIDIT_WORKFLOW_ID:?Set FLOUCNA_DIDIT_WORKFLOW_ID in .env}
      - FLOUCNA_DIDIT_API_KEY=${FLOUCNA_DIDIT_API_KEY:?Set FLOUCNA_DIDIT_API_KEY in .env}
      - FLOUCNA_DIDIT_WEBHOOK_SECRET=${FLOUCNA_DIDIT_WEBHOOK_SECRET:?Set FLOUCNA_DIDIT_WEBHOOK_SECRET in .env}
      - FLOUCNA_DIDIT_WEBHOOK_URL=${FLOUCNA_DIDIT_WEBHOOK_URL:-https://${NGROK_DOMAIN}/api/kyc/webhook/didit}
      - FLOUCNA_DIDIT_CALLBACK_URL=${FLOUCNA_DIDIT_CALLBACK_URL:-http://localhost:3000/kyc}

      # Enhanced schema reset on startup
      - FLOUCNA_SCHEMA_RESET=true
    networks:
      - floucna-net
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  ngrok:
    image: ngrok/ngrok:latest
    container_name: floucna-ngrok
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
      - NGROK_DOMAIN=${NGROK_DOMAIN:-}
    command:
      - "http"
      - "http://backend:8080"
      - "--url=https://${NGROK_DOMAIN:?Set NGROK_DOMAIN in .env}"
    ports:
      - "4040:4040"
    networks:
      - floucna-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
        NEXT_PUBLIC_AUTH_MODE: KEYCLOAK
        NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8081
        NEXT_PUBLIC_KEYCLOAK_REALM: floucna
        NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: floucna-frontend
    container_name: floucna-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NEXT_PUBLIC_AUTH_MODE=KEYCLOAK
      - NEXT_PUBLIC_KEYCLOAK_URL=http://localhost:8081
      - NEXT_PUBLIC_KEYCLOAK_REALM=floucna
      - NEXT_PUBLIC_KEYCLOAK_CLIENT_ID=floucna-frontend
    networks:
      - floucna-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  floucna-db:
    name: floucna-db
  floucna-storage:
    name: floucna-storage
  floucna-keycloak-db:
    name: floucna-keycloak-db

networks:
  floucna-net:
    name: floucna-net
    driver: bridge
